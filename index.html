<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stargazer — realtime robot 3D viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 12px; left: 12px;
    color: #888; font-size: 13px;
    background: rgba(10,10,15,0.85);
    padding: 8px 14px; border-radius: 6px;
    border: 1px solid #222;
  }
  #hud .green { color: #4f4; }
  #hud .red { color: #f44; }
</style>
</head>
<body>
<div id="hud">
  <span id="status" class="red">● 连接中...</span><br>
  轨迹点: <span id="traj-count">0</span><br>
  点云点数: <span id="pc-count">0</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { ColladaLoader } from 'three/addons/loaders/ColladaLoader.js';

// ── URDF Loader (chained from CDN) ──
let URDFLoader;
try {
  const urdfModule = await import('https://cdn.jsdelivr.net/npm/urdf-loader@0.13.0/src/URDFLoader.min.js');
  URDFLoader = urdfModule.default;
} catch(e) {
  // Dynamic import fallback
  const resp = await fetch('https://cdn.jsdelivr.net/npm/urdf-loader@0.13.0/src/URDFLoader.min.js');
  const code = await resp.text();
  const blob = new Blob([code], {type:'text/javascript'});
  const url = URL.createObjectURL(blob);
  URDFLoader = (await import(url)).default;
}

// ── Scene Setup ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 20, 100);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(8, 6, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

scene.add(new THREE.AmbientLight(0x333344, 3));
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

const grid = new THREE.GridHelper(40, 40, 0x222233, 0x111122);
scene.add(grid);

const axisLen = 2;
scene.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(axisLen,0,0)]),
  new THREE.LineBasicMaterial({color:0xff3333})));
scene.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,axisLen,0)]),
  new THREE.LineBasicMaterial({color:0x33ff33})));
scene.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,axisLen)]),
  new THREE.LineBasicMaterial({color:0x3366ff})));

const trajPoints = [];
const trajGeom = new THREE.BufferGeometry();
const trajCloud = new THREE.Points(trajGeom, new THREE.PointsMaterial({ color: 0x44ff88, size: 0.08 }));
scene.add(trajCloud);
const trajLineGeom = new THREE.BufferGeometry();
const trajLine = new THREE.Line(trajLineGeom, new THREE.LineBasicMaterial({ color: 0x44ff88, transparent:true, opacity:0.4 }));
scene.add(trajLine);

const pcGeom = new THREE.BufferGeometry();
const pcCloud = new THREE.Points(pcGeom, new THREE.PointsMaterial({ color: 0xffaa44, size: 0.04, sizeAttenuation: true }));
scene.add(pcCloud);

// ── Robot URDF Model ──
const robotRoot = new THREE.Group();
scene.add(robotRoot);
let robotModel = null;  // set after URDF loads

// Walking animation state
let walkPhase = 0;
const walkSpeed = 8; // rad/s

// Load Go1 URDF
const loader = new URDFLoader();
loader.packages = { 'go1_description': './models/go1' };
loader.loadMeshCb = (path, manager, done) => {
  new ColladaLoader(manager).load(path, (collada) => done(collada.scene), null, () => done(null));
};
loader.load('./models/go1/go1.urdf', (robot) => {
  robotModel = robot;
  // Scale down — URDF is in meters, our scene is small
  robot.scale.set(0.5, 0.5, 0.5);
  robotRoot.add(robot);
  document.getElementById('status').textContent = '● Go1 模型已加载';
});

// ── Walking animation — drives 12 leg joints with sin/cos ──
const LEG_JOINTS = [
  'FR_hip_joint', 'FR_thigh_joint', 'FR_calf_joint',
  'FL_hip_joint', 'FL_thigh_joint', 'FL_calf_joint',
  'RR_hip_joint', 'RR_thigh_joint', 'RR_calf_joint',
  'RL_hip_joint', 'RL_thigh_joint', 'RL_calf_joint',
];

function animateLegs(dt) {
  if (!robotModel) return;
  walkPhase += walkSpeed * dt;
  const p = walkPhase;

  // Each leg: hip swings, thigh+knee create a trot gait
  const legs = [
    { hip: 'FR_hip_joint', thigh: 'FR_thigh_joint', calf: 'FR_calf_joint', phase: 0 },
    { hip: 'FL_hip_joint', thigh: 'FL_thigh_joint', calf: 'FL_calf_joint', phase: Math.PI },
    { hip: 'RR_hip_joint', thigh: 'RR_thigh_joint', calf: 'RR_calf_joint', phase: Math.PI },
    { hip: 'RL_hip_joint', thigh: 'RL_thigh_joint', calf: 'RL_calf_joint', phase: 0 },
  ];

  for (const leg of legs) {
    const lp = p + leg.phase;
    trySetJoint(leg.hip,  0.5 * Math.cos(lp));
    trySetJoint(leg.thigh, 0.6 * Math.sin(lp));
    trySetJoint(leg.calf, -0.4 * Math.sin(lp));
  }
}

function trySetJoint(name, value) {
  try {
    if (robotModel && robotModel.joints[name]) {
      robotModel.joints[name].setJointValue(value);
    }
  } catch(e) {}
}

// ── Render Loop ──
let lastTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  animateLegs(dt);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── HUD ──
const statusEl = document.getElementById('status');
const trajCountEl = document.getElementById('traj-count');
const pcCountEl = document.getElementById('pc-count');

// ── ROS Bridge ──
const wsUrl = `ws://${window.location.host}/ws`;
let rosConnected = false;

function connect() {
  const ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    rosConnected = true;
    statusEl.textContent = robotModel ? '● 已连接' : '● Go1 模型已加载';
    statusEl.className = 'green';
    ws.send(JSON.stringify({ op: 'subscribe', topic: '/dlio/odom_node/odom', type: 'nav_msgs/msg/Odometry' }));
    ws.send(JSON.stringify({ op: 'subscribe', topic: '/dlio/odom_node/pointcloud/deskewed', type: 'sensor_msgs/msg/PointCloud2' }));
  };
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.op !== 'publish') return;
    if (msg.topic === '/dlio/odom_node/odom') handleOdometry(msg.msg);
    else if (msg.topic === '/dlio/odom_node/pointcloud/deskewed') handlePointCloud(msg.msg);
  };
  ws.onclose = () => { rosConnected = false; statusEl.textContent = '● 断开，3秒后重连...'; statusEl.className = 'red'; setTimeout(connect, 3000); };
  ws.onerror = () => { statusEl.textContent = '● 连接失败'; statusEl.className = 'red'; };
}

// ── Coordinate conversion ──
function rosToThree(x, y, z) { return new THREE.Vector3(x, z, -y); }

// ── Odometry Handler ──
function handleOdometry(msg) {
  const p = msg.pose.pose.position;
  const pos = rosToThree(p.x, p.y, p.z);
  trajPoints.push(pos);
  if (trajPoints.length > 10000) trajPoints.shift();
  trajGeom.setFromPoints(trajPoints);
  trajLineGeom.setFromPoints(trajPoints);
  trajCountEl.textContent = trajPoints.length;

  const q = msg.pose.pose.orientation;
  const rosQ = new THREE.Quaternion(q.x, q.y, q.z, q.w);
  const rot = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), -Math.PI/2);
  robotRoot.position.copy(pos);
  robotRoot.quaternion.copy(rot).multiply(rosQ);
}

// ── Point Cloud Handler ──
function handlePointCloud(msg) {
  if (!msg.data || msg.width === 0) return;
  const raw = atob(msg.data);
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  let ox = 0, oy = 0, oz = 0;
  for (const f of msg.fields) {
    if (f.name === 'x') ox = f.offset;
    if (f.name === 'y') oy = f.offset;
    if (f.name === 'z') oz = f.offset;
  }
  const view = new DataView(bytes.buffer);
  const pts = [];
  for (let i = 0; i < msg.width; i++) {
    const off = i * msg.point_step;
    pts.push(rosToThree(view.getFloat32(off+ox,true), view.getFloat32(off+oy,true), view.getFloat32(off+oz,true)));
  }
  pcGeom.setFromPoints(pts);
  pcCountEl.textContent = pts.length;
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

connect();
</script>
</body>
</html>

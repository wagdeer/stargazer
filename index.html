<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stargazer — realtime robot 3D viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 12px; left: 12px;
    color: #888; font-size: 13px;
    background: rgba(10,10,15,0.85);
    padding: 8px 14px; border-radius: 6px;
    border: 1px solid #222;
  }
  #hud .green { color: #4f4; }
  #hud .red { color: #f44; }
  #hud .yellow { color: #fc4; }
</style>
</head>
<body>
<div id="hud">
  <span id="status" class="yellow">● 加载模型中...</span><br>
  轨迹点: <span id="traj-count">0</span><br>
  点云点数: <span id="pc-count">0</span><br>
  关节数: <span id="joint-count">0</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ═══════════════════════════════════════════════════════
// Scene Setup
// ═══════════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 20, 100);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(5, 4, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0.5);
controls.update();

// Lights
scene.add(new THREE.AmbientLight(0x404060, 4));
const dirLight = new THREE.DirectionalLight(0xffffff, 3);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x8899cc, 1.5);
fillLight.position.set(-5, 2, -5);
scene.add(fillLight);

// Grid
const grid = new THREE.GridHelper(40, 40, 0x222233, 0x111122);
scene.add(grid);

// Axis
const axisLen = 2;
const matR = new THREE.LineBasicMaterial({color: 0xff3333});
const matG = new THREE.LineBasicMaterial({color: 0x33ff33});
const matB = new THREE.LineBasicMaterial({color: 0x3366ff});
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(axisLen,0,0)]), matR));
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,axisLen,0)]), matG));
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,axisLen)]), matB));

// Trajectory
const trajPoints = [];
const trajGeom = new THREE.BufferGeometry();
const trajCloud = new THREE.Points(trajGeom, new THREE.PointsMaterial({ color: 0x44ff88, size: 0.08 }));
scene.add(trajCloud);
const trajLineGeom = new THREE.BufferGeometry();
const trajLine = new THREE.Line(trajLineGeom, new THREE.LineBasicMaterial({ color: 0x44ff88, transparent: true, opacity: 0.4 }));
scene.add(trajLine);

// Point Cloud
const pcGeom = new THREE.BufferGeometry();
const pcCloud = new THREE.Points(pcGeom, new THREE.PointsMaterial({ color: 0xffaa44, size: 0.04, sizeAttenuation: true }));
scene.add(pcCloud);

// ═══════════════════════════════════════════════════════
// Robot Model (GLTF)
// ═══════════════════════════════════════════════════════
const robotRoot = new THREE.Group();
// ROS frame → three.js frame: rotate -90° around X
// ROS: X-fwd, Y-left, Z-up  →  three.js: X-right, Y-up, Z-towards-viewer
// Equivalent to: (X,Y,Z)_ros → (X, Z, -Y)_three
robotRoot.rotation.set(-Math.PI/2, 0, 0);
scene.add(robotRoot);

const loader = new GLTFLoader();
let robotModel = null;    // The loaded GLTF scene
let jointNodes = {};      // name → Object3D for revolute joints
let baseNode = null;      // 'base' node for applying SLAM pose

// Revivable joint definitions from URDF
const JOINT_DEFS = {
  // Hip joints: revolute around X (abduction/adduction)
  FR_hip: { axis: [1, 0, 0], parent: 'trunk' },
  FL_hip: { axis: [1, 0, 0], parent: 'trunk' },
  RR_hip: { axis: [1, 0, 0], parent: 'trunk' },
  RL_hip: { axis: [1, 0, 0], parent: 'trunk' },
  // Thigh joints: revolute around Y (hip pitch)
  FR_thigh: { axis: [0, 1, 0], parent: 'FR_hip' },
  FL_thigh: { axis: [0, 1, 0], parent: 'FL_hip' },
  RR_thigh: { axis: [0, 1, 0], parent: 'RR_hip' },
  RL_thigh: { axis: [0, 1, 0], parent: 'RL_hip' },
  // Calf joints: revolute around Y (knee)
  FR_calf: { axis: [0, 1, 0], parent: 'FR_thigh' },
  FL_calf: { axis: [0, 1, 0], parent: 'FL_thigh' },
  RR_calf: { axis: [0, 1, 0], parent: 'RR_thigh' },
  RL_calf: { axis: [0, 1, 0], parent: 'RL_thigh' },
};

loader.load(
  'models/go1/go1.glb',
  (gltf) => {
    robotModel = gltf.scene;
    robotRoot.add(robotModel);

    // Extract joint nodes
    robotModel.traverse((node) => {
      if (JOINT_DEFS[node.name]) {
        jointNodes[node.name] = node;
        // Store the original local matrix for position reference
        node.userData.restPosition = node.position.clone();
        node.userData.restQuaternion = node.quaternion.clone();
      }
      if (node.name === 'base') {
        baseNode = node;
      }
    });

    const count = Object.keys(jointNodes).length;
    document.getElementById('joint-count').textContent = count;
    // Update status — if ROS is already connected, show green
    const statusEl = document.getElementById('status');
    if (rosConnected) {
      statusEl.textContent = '● 已连接';
      statusEl.className = 'green';
    } else {
      statusEl.textContent = '● 模型就绪，等待ROS...';
      statusEl.className = 'yellow';
    }
    console.log(`Robot loaded: ${count} animatable joints`, jointNodes);
  },
  (progress) => {
    const pct = Math.round((progress.loaded / progress.total) * 100);
    document.getElementById('status').textContent = `● 加载中 ${pct}%...`;
  },
  (error) => {
    console.error('GLB load error:', error);
    document.getElementById('status').textContent = '● 模型加载失败';
    document.getElementById('status').className = 'red';
  }
);

// ═══════════════════════════════════════════════════════
// Walking Gait Animation
// ═══════════════════════════════════════════════════════
const gait = {
  time: 0,
  speed: 4.0,        // gait speed (rad/s)
  hipAmp: 0.35,      // hip abduction amplitude (rad)
  thighAmp: 0.6,     // thigh pitch amplitude (rad)
  calfAmp: 0.8,      // calf pitch amplitude (rad)
  phaseOffsets: {
    // Trot gait: diagonal pairs in phase
    FR_hip: 0,        FR_thigh: 0,        FR_calf: Math.PI / 2,
    FL_hip: Math.PI,  FL_thigh: Math.PI,  FL_calf: Math.PI + Math.PI / 2,
    RR_hip: Math.PI,  RR_thigh: Math.PI,  RR_calf: Math.PI + Math.PI / 2,
    RL_hip: 0,        RL_thigh: 0,        RL_calf: Math.PI / 2,
  },
};

function updateGait(dt) {
  if (Object.keys(jointNodes).length === 0) return;
  gait.time += dt * gait.speed;

  for (const [name, def] of Object.entries(JOINT_DEFS)) {
    const node = jointNodes[name];
    if (!node) continue;

    const phase = gait.phaseOffsets[name] || 0;
    let amplitude;

    if (name.includes('hip') && !name.includes('thigh')) {
      amplitude = gait.hipAmp;
    } else if (name.includes('thigh')) {
      amplitude = gait.thighAmp;
    } else if (name.includes('calf')) {
      amplitude = gait.calfAmp;
    } else {
      continue;
    }

    const angle = Math.sin(gait.time + phase) * amplitude;
    const [ax, ay, az] = def.axis;

    // Apply rotation around joint axis
    node.quaternion.copy(node.userData.restQuaternion);
    const rot = new THREE.Quaternion().setFromAxisAngle(
      new THREE.Vector3(ax, ay, az), angle
    );
    node.quaternion.premultiply(rot);
  }
}

// ═══════════════════════════════════════════════════════
// ROS Bridge & Data Handling
// ═══════════════════════════════════════════════════════
const wsUrl = `ws://${window.location.hostname}:9090`;
let rosConnected = false;
let robotPose = null; // {position: Vector3, quaternion: Quaternion}

function connectROS() {
  const ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    rosConnected = true;
    const statusEl = document.getElementById('status');
    statusEl.textContent = '● 已连接';
    statusEl.className = 'green';

    ws.send(JSON.stringify({
      op: 'subscribe', topic: '/dlio/odom_node/odom', type: 'nav_msgs/msg/Odometry'
    }));
    ws.send(JSON.stringify({
      op: 'subscribe', topic: '/dlio/odom_node/pointcloud/deskewed', type: 'sensor_msgs/msg/PointCloud2'
    }));
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.op === 'publish') {
      if (msg.topic === '/dlio/odom_node/odom') {
        handleOdometry(msg.msg);
      } else if (msg.topic === '/dlio/odom_node/pointcloud/deskewed') {
        handlePointCloud(msg.msg);
      }
    }
  };

  ws.onclose = () => {
    rosConnected = false;
    document.getElementById('status').textContent = '● 断开，3秒后重连...';
    document.getElementById('status').className = 'red';
    setTimeout(connectROS, 3000);
  };

  ws.onerror = () => {
    document.getElementById('status').textContent = '● 连接失败';
    document.getElementById('status').className = 'red';
  };
}

function rosToThree(x, y, z) {
  // ROS (X-fwd, Y-left, Z-up) → three.js (X-right, Y-up, Z-towards-viewer)
  return new THREE.Vector3(x, z, -y);
}

function rosQuatToThree(qx, qy, qz, qw) {
  // ROS orientation in three.js frame
  return new THREE.Quaternion(qx, qz, -qy, qw);
}

function handleOdometry(msg) {
  const p = msg.pose.pose.position;
  // Trajectory points: convert to three.js world frame
  const pos = rosToThree(p.x, p.y, p.z);
  trajPoints.push(pos);
  if (trajPoints.length > 10000) trajPoints.shift();
  trajGeom.setFromPoints(trajPoints);
  trajLineGeom.setFromPoints(trajPoints);
  document.getElementById('traj-count').textContent = trajPoints.length;

  // Robot base pose: keep in ROS frame — robotRoot handles the conversion
  const q = msg.pose.pose.orientation;
  robotPose = {
    position: new THREE.Vector3(p.x, p.y, p.z),
    quaternion: new THREE.Quaternion(q.x, q.y, q.z, q.w),
  };
}

function handlePointCloud(msg) {
  if (!msg.data || msg.width === 0) return;
  const raw = atob(msg.data);
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

  let ox = 0, oy = 0, oz = 0;
  for (const f of msg.fields) {
    if (f.name === 'x') ox = f.offset;
    if (f.name === 'y') oy = f.offset;
    if (f.name === 'z') oz = f.offset;
  }

  const view = new DataView(bytes.buffer);
  const pointStep = msg.point_step;
  const points = [];

  for (let i = 0; i < msg.width; i++) {
    const off = i * pointStep;
    const rx = view.getFloat32(off + ox, true);
    const ry = view.getFloat32(off + oy, true);
    const rz = view.getFloat32(off + oz, true);
    points.push(rosToThree(rx, ry, rz));
  }

  pcGeom.setFromPoints(points);
  document.getElementById('pc-count').textContent = points.length;
}

// ═══════════════════════════════════════════════════════
// Render Loop
// ═══════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  controls.update();

  // Animate walking gait (always, even without ROS)
  updateGait(dt);

  // Apply SLAM pose to base node
  if (robotPose && baseNode) {
    baseNode.position.copy(robotPose.position);
    baseNode.quaternion.copy(robotPose.quaternion);
  }

  renderer.render(scene, camera);
}
animate();

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start ROS connection
connectROS();
</script>
</body>
</html>

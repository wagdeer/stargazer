<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stargazer — realtime robot 3D viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 12px; left: 12px;
    color: #888; font-size: 13px;
    background: rgba(10,10,15,0.85);
    padding: 8px 14px; border-radius: 6px;
    border: 1px solid #222;
  }
  #hud .green { color: #4f4; }
  #hud .red { color: #f44; }
</style>
</head>
<body>
<div id="hud">
  <span id="status" class="red">● 连接中...</span><br>
  轨迹点: <span id="traj-count">0</span><br>
  点云点数: <span id="pc-count">0</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 20, 100);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(6, 4, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.minDistance = 0.3;
controls.maxDistance = 200;
controls.update();

scene.add(new THREE.AmbientLight(0x333344, 3));
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

scene.add(new THREE.GridHelper(40, 40, 0x222233, 0x111122));

const axisLen = 2;
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(axisLen,0,0)]),new THREE.LineBasicMaterial({color:0xff3333})));
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,axisLen,0)]),new THREE.LineBasicMaterial({color:0x33ff33})));
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,axisLen)]),new THREE.LineBasicMaterial({color:0x3366ff})));

const trajPoints = [];
const trajGeom = new THREE.BufferGeometry();
const trajCloud = new THREE.Points(trajGeom, new THREE.PointsMaterial({color:0x44ff88,size:0.08}));
scene.add(trajCloud);
const trajLineGeom = new THREE.BufferGeometry();
const trajLine = new THREE.Line(trajLineGeom, new THREE.LineBasicMaterial({color:0x44ff88,transparent:true,opacity:0.4}));
scene.add(trajLine);

const pcGeom = new THREE.BufferGeometry();
const pcCloud = new THREE.Points(pcGeom, new THREE.PointsMaterial({color:0xffaa44,size:0.04,sizeAttenuation:true}));
scene.add(pcCloud);

// ── Robot GLTF Model ──
const robotRoot = new THREE.Group();
scene.add(robotRoot);
let legJoints = {};
let walkPhase = 0;
const walkSpeed = 10;

const gltfLoader = new GLTFLoader();
gltfLoader.load('./models/go1/go1.glb', (gltf) => {
  const model = gltf.scene;
  model.scale.set(1.5, 1.5, 1.5);

  // Find revolute joint nodes
  const jointSet = new Set([
    'FR_hip', 'FR_thigh', 'FR_calf', 'FL_hip', 'FL_thigh', 'FL_calf',
    'RR_hip', 'RR_thigh', 'RR_calf', 'RL_hip', 'RL_thigh', 'RL_calf',
  ]);
  model.traverse((node) => {
    if (jointSet.has(node.name)) legJoints[node.name] = node;
  });

  robotRoot.add(model);
  const n = Object.keys(legJoints).length;
  document.getElementById('status').textContent = `● Go1 (${n}/12 joints)`;
  console.log('Go1 loaded, joints:', Object.keys(legJoints));
}, null, (err) => console.error('GLTF error:', err));

function animateLegs(dt) {
  if (Object.keys(legJoints).length < 4) return;
  walkPhase += walkSpeed * dt;
  const p = walkPhase;

  const legs = [
    { hip: 'FR_hip', thigh: 'FR_thigh', calf: 'FR_calf', phase: 0 },
    { hip: 'FL_hip', thigh: 'FL_thigh', calf: 'FL_calf', phase: Math.PI },
    { hip: 'RR_hip', thigh: 'RR_thigh', calf: 'RR_calf', phase: Math.PI },
    { hip: 'RL_hip', thigh: 'RL_thigh', calf: 'RL_calf', phase: 0 },
  ];
  for (const leg of legs) {
    const h = legJoints[leg.hip], t = legJoints[leg.thigh], c = legJoints[leg.calf];
    const lp = p + leg.phase;
    if (h) h.rotation.set(0.6 * Math.sin(lp), 0, 0.3 * Math.cos(lp));
    if (t) t.rotation.set(0.8 * Math.sin(lp), 0, 0);
    if (c) c.rotation.set(-0.5 * Math.sin(lp), 0, 0);
  }
}

let lastTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const dt = (performance.now() - lastTime) / 1000;
  lastTime = performance.now();
  animateLegs(dt);
  controls.update();
  renderer.render(scene, camera);
}
animate();

const statusEl = document.getElementById('status');
const trajCountEl = document.getElementById('traj-count');
const pcCountEl = document.getElementById('pc-count');

const wsUrl = `ws://${location.hostname}:9090`;
function connect() {
  const ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    statusEl.className = 'green';
    ws.send(JSON.stringify({op:'subscribe',topic:'/dlio/odom_node/odom',type:'nav_msgs/msg/Odometry'}));
    ws.send(JSON.stringify({op:'subscribe',topic:'/dlio/odom_node/pointcloud/deskewed',type:'sensor_msgs/msg/PointCloud2'}));
  };
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (m.op !== 'publish') return;
    if (m.topic === '/dlio/odom_node/odom') handleOdometry(m.msg);
    else if (m.topic === '/dlio/odom_node/pointcloud/deskewed') handlePointCloud(m.msg);
  };
  ws.onclose = () => { statusEl.textContent='● 断开'; statusEl.className='red'; setTimeout(connect,3000); };
  ws.onerror = () => { statusEl.textContent='● 失败'; statusEl.className='red'; };
}

function rosToThree(x,y,z) { return new THREE.Vector3(x,z,-y); }

function handleOdometry(msg) {
  const p = msg.pose.pose.position;
  const pos = rosToThree(p.x, p.y, p.z);
  trajPoints.push(pos);
  if (trajPoints.length > 10000) trajPoints.shift();
  trajGeom.setFromPoints(trajPoints);
  trajLineGeom.setFromPoints(trajPoints);
  trajCountEl.textContent = trajPoints.length;
  const q = msg.pose.pose.orientation;
  robotRoot.position.copy(pos);
  robotRoot.quaternion.set(q.x, q.y, q.z, q.w);
}

function handlePointCloud(msg) {
  if (!msg.data || msg.width===0) return;
  const raw = atob(msg.data);
  const bytes = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
  let ox=0,oy=0,oz=0;
  for(const f of msg.fields){if(f.name==='x')ox=f.offset;if(f.name==='y')oy=f.offset;if(f.name==='z')oz=f.offset;}
  const view = new DataView(bytes.buffer);
  const pts=[];
  for(let i=0;i<msg.width;i++){
    const o=i*msg.point_step;
    pts.push(rosToThree(view.getFloat32(o+ox,true),view.getFloat32(o+oy,true),view.getFloat32(o+oz,true)));
  }
  pcGeom.setFromPoints(pts);
  pcCountEl.textContent=pts.length;
}

window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
connect();
</script>
</body>
</html>

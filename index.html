<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stargazer — realtime robot 3D viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 12px; left: 12px;
    color: #888; font-size: 13px;
    background: rgba(10,10,15,0.85);
    padding: 8px 14px; border-radius: 6px;
    border: 1px solid #222;
  }
  #hud .green { color: #4f4; }
  #hud .red { color: #f44; }
  #hud .yellow { color: #fc4; }
</style>
</head>
<body>
<div id="hud">
  <span id="status" class="yellow">● 加载模型中...</span><br>
  速度: <span id="speed">0.00</span> m/s<br>
  轨迹点: <span id="traj-count">0</span><br>
  点云点数: <span id="pc-count">0</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ═══════════════════════════════════════════════════════
// Scene Setup
// ═══════════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 20, 100);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(5, 4, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0.5);
controls.update();

// Lights
scene.add(new THREE.AmbientLight(0x404060, 4));
const dirLight = new THREE.DirectionalLight(0xffffff, 3);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x8899cc, 1.5);
fillLight.position.set(-5, 2, -5);
scene.add(fillLight);

// Grid
const grid = new THREE.GridHelper(40, 40, 0x222233, 0x111122);
scene.add(grid);

// Axis
const axisLen = 2;
const matR = new THREE.LineBasicMaterial({color: 0xff3333});
const matG = new THREE.LineBasicMaterial({color: 0x33ff33});
const matB = new THREE.LineBasicMaterial({color: 0x3366ff});
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(axisLen,0,0)]), matR));
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,axisLen,0)]), matG));
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,axisLen)]), matB));

// Trajectory
const trajPoints = [];
const trajGeom = new THREE.BufferGeometry();
const trajCloud = new THREE.Points(trajGeom, new THREE.PointsMaterial({ color: 0x44ff88, size: 0.08 }));
scene.add(trajCloud);
const trajLineGeom = new THREE.BufferGeometry();
const trajLine = new THREE.Line(trajLineGeom, new THREE.LineBasicMaterial({ color: 0x44ff88, transparent: true, opacity: 0.4 }));
scene.add(trajLine);

// Point Cloud
const pcGeom = new THREE.BufferGeometry();
const pcCloud = new THREE.Points(pcGeom, new THREE.PointsMaterial({ color: 0xffaa44, size: 0.04, sizeAttenuation: true }));
scene.add(pcCloud);

// ═══════════════════════════════════════════════════════
// Robot Model (GLTF)
// ═══════════════════════════════════════════════════════
const robotRoot = new THREE.Group();
robotRoot.rotation.set(-Math.PI/2, 0, 0);
scene.add(robotRoot);

const loader = new GLTFLoader();
let robotModel = null;
let jointNodes = {};
let baseNode = null;

const JOINT_DEFS = {
  FR_hip: { axis: [1, 0, 0] }, FL_hip: { axis: [1, 0, 0] },
  RR_hip: { axis: [1, 0, 0] }, RL_hip: { axis: [1, 0, 0] },
  FR_thigh: { axis: [0, 1, 0] }, FL_thigh: { axis: [0, 1, 0] },
  RR_thigh: { axis: [0, 1, 0] }, RL_thigh: { axis: [0, 1, 0] },
  FR_calf: { axis: [0, 1, 0] }, FL_calf: { axis: [0, 1, 0] },
  RR_calf: { axis: [0, 1, 0] }, RL_calf: { axis: [0, 1, 0] },
};

loader.load(
  'models/go1/go1.glb',
  (gltf) => {
    robotModel = gltf.scene;
    robotRoot.add(robotModel);

    // Extract joint nodes and apply rear-leg 180° Y flip
    const rearFlip = new THREE.Quaternion().setFromAxisAngle(
      new THREE.Vector3(0, 1, 0), Math.PI
    );
    robotModel.traverse((node) => {
      if (JOINT_DEFS[node.name]) {
        jointNodes[node.name] = node;
        node.userData.restPosition = node.position.clone();
        let q = node.quaternion.clone();
        // Rear legs (RR/RL): flip mesh 180° around Y — same kinematics, correct visual
        if (node.name.startsWith('RR_') || node.name.startsWith('RL_')) {
          q.premultiply(rearFlip);
        }
        node.userData.restQuaternion = q;
      }
      if (node.name === 'base') baseNode = node;
    });
    const statusEl = document.getElementById('status');
    if (rosConnected) { statusEl.textContent = '● 已连接'; statusEl.className = 'green'; }
    else { statusEl.textContent = '● 模型就绪，等待ROS...'; statusEl.className = 'yellow'; }
  },
  (p) => { document.getElementById('status').textContent = `● 加载中 ${Math.round(p.loaded/p.total*100)}%...`; },
  (e) => { console.error(e); document.getElementById('status').textContent = '● 加载失败'; document.getElementById('status').className = 'red'; }
);

// ═══════════════════════════════════════════════════════
// Leg IK — correct 2-DOF solver for three.js GLTF chain
//
// three.js transform chain per leg:
//   thigh node: translate(0, -0.08, 0), rotate_y(θ1)
//   calf  node: translate(0, 0, -0.213), rotate_y(θ2)
//   foot  tip:  (0, 0, -0.24) in calf local
//
// FK: fx = -L2*sin(θ1+θ2) - L1z*sin(θ1)
//     fz = -L2*cos(θ1+θ2) - L1z*cos(θ1)
// ═══════════════════════════════════════════════════════
const L1z = 0.213;   // calf joint Z-offset from thigh frame
const L2  = 0.24;    // calf mesh visual length (hip→foot ≈ 0.29m total)

function solveLegIK(fx, fz) {
  // Solve for θ1 (thigh), θ2 (calf)
  const denom = Math.sqrt(fx * fx + fz * fz);
  const K = (L1z * L1z - fx * fx - fz * fz - L2 * L2) / (2 * L2);

  let S; // θ1 + θ2
  if (denom < 1e-10) {
    S = Math.PI;
  } else {
    const phi = Math.atan2(fz, fx);
    let ratio = K / denom;
    ratio = Math.max(-1, Math.min(1, ratio));
    S = Math.asin(ratio) - phi;
  }

  const sinT1 = -(fx + L2 * Math.sin(S)) / L1z;
  const cosT1 = -(fz + L2 * Math.cos(S)) / L1z;
  let thigh = Math.atan2(sinT1, cosT1);
  let calf = S - thigh;

  // Normalize
  while (calf > Math.PI) calf -= 2 * Math.PI;
  while (calf < -Math.PI) calf += 2 * Math.PI;

  return { thigh, calf };
}


// ═══════════════════════════════════════════════════════
// Gait Engine — velocity-driven foot trajectory + IK
// ═══════════════════════════════════════════════════════
const GaitEngine = {
  phase: { FR: 0, FL: 0, RR: 0, RL: 0 },
  speed: 0,
  stepLength: 0.06,

  // Tunable parameters
  baseStepLength: 0.04,
  maxStepLength: 0.10,
  stanceRatio: 0.55,
  liftHeight: 0.05,
  standHeight: -0.24,    // foot Z in hip frame at standing
  speedGain: 2.5,
  deadband: 0.02,
  blendRate: 5.0,

  standBlend: 1.0,       // start in standing pose

  // Trot gait: diagonal pairs in phase
  offsets: {
    FR: 0.0, FL: 0.5,
    RR: 0.5, RL: 0.0,
  },

  // Front legs mirror: negate IK result (thigh forward, foot mirrored in X)
  // All legs share the same foot trajectory (ahead→behind during stance)
  isFront: {
    FR: true, FL: true,
    RR: false, RL: false,
  },

  update(dt, vx) {
    const absV = Math.abs(vx);

    if (absV < this.deadband) {
      this.standBlend = Math.min(1, this.standBlend + dt * this.blendRate);
      for (const leg of ['FR','FL','RR','RL'])
        this.phase[leg] = (this.phase[leg] + dt * 0.3) % 1;
      this.speed = 0;
      this.stepLength = this.baseStepLength;
      return;
    }

    this.standBlend = Math.max(0, this.standBlend - dt * this.blendRate);
    this.speed = absV;
    this.stepLength = this.baseStepLength
      + (this.maxStepLength - this.baseStepLength) * Math.min(absV / 1.5, 1.0);

    const phaseRate = absV * this.speedGain;
    for (const leg of ['FR','FL','RR','RL'])
      this.phase[leg] = (this.phase[leg] + dt * phaseRate) % 1;
  },

  footTarget(leg) {
    let phase = (this.phase[leg] + this.offsets[leg]) % 1;
    const sl = this.stepLength;

    let fx, fz;
    if (phase < this.stanceRatio) {
      const s = phase / this.stanceRatio;
      fx = sl * (0.5 - s);     // +sl/2 → -sl/2 (ahead→behind)
      fz = this.standHeight;
    } else {
      const s = (phase - this.stanceRatio) / (1 - this.stanceRatio);
      fx = -sl * 0.5 + sl * s; // -sl/2 → +sl/2 (behind→ahead, swing forward)
      fz = this.standHeight + this.liftHeight * Math.sin(Math.PI * s);
    }
    return { fx, fz };
  },

  computeJoints() {
    const result = {};
    const blend = this.standBlend;

    // Standing foot targets: all legs same (rear posture: foot ahead of hip)
    // Front legs negate IK to get mirrored posture (foot behind hip, thigh forward)
    const standFX = 0.03;
    const standFZ = -0.24;
    const ikStand = solveLegIK(standFX, standFZ);

    for (const leg of ['FR', 'FL', 'RR', 'RL']) {
      const { fx, fz } = this.footTarget(leg);
      let { thigh, calf } = solveLegIK(fx, fz);
      let standThigh = ikStand.thigh;
      let standCalf = ikStand.calf;

      // Front legs: negate both angles → mirrored posture (thigh forward)
      if (this.isFront[leg]) {
        thigh = -thigh;
        calf = -calf;
        standThigh = -standThigh;
        standCalf = -standCalf;
      }

      // Blend walking ↔ standing
      const t = thigh * (1 - blend) + standThigh * blend;
      const c = calf  * (1 - blend) + standCalf  * blend;

      // Hip abduction: small lateral oscillation
      const hipPhase = (this.phase[leg] + this.offsets[leg]) % 1;
      const hip = 0.06 * Math.sin(hipPhase * Math.PI * 2) * (1 - blend);

      result[leg] = { hip, thigh: t, calf: c };
    }
    return result;
  },
};


// ═══════════════════════════════════════════════════════
// Apply gait to GLTF nodes
// ═══════════════════════════════════════════════════════
function applyGait(joints) {
  for (const [leg, angles] of Object.entries(joints)) {
    const hipNode = jointNodes[leg + '_hip'];
    const thighNode = jointNodes[leg + '_thigh'];
    const calfNode = jointNodes[leg + '_calf'];

    // Hip abduction (X rotation)
    if (hipNode) {
      hipNode.quaternion.copy(hipNode.userData.restQuaternion);
      const rot = new THREE.Quaternion().setFromAxisAngle(
        new THREE.Vector3(1, 0, 0), angles.hip
      );
      hipNode.quaternion.premultiply(rot);
    }

    // Thigh pitch (Y rotation)
    if (thighNode) {
      thighNode.quaternion.copy(thighNode.userData.restQuaternion);
      const rot = new THREE.Quaternion().setFromAxisAngle(
        new THREE.Vector3(0, 1, 0), angles.thigh
      );
      thighNode.quaternion.premultiply(rot);
    }

    // Calf (knee, Y rotation)
    if (calfNode) {
      calfNode.quaternion.copy(calfNode.userData.restQuaternion);
      const rot = new THREE.Quaternion().setFromAxisAngle(
        new THREE.Vector3(0, 1, 0), angles.calf
      );
      calfNode.quaternion.premultiply(rot);
    }
  }
}


// ═══════════════════════════════════════════════════════
// ROS Bridge & Data Handling
// ═══════════════════════════════════════════════════════
const wsUrl = `ws://${window.location.hostname}:9090`;
let rosConnected = false;
let robotPose = null;
let robotVelocity = 0;  // m/s, ROS X (forward)

function connectROS() {
  const ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    rosConnected = true;
    const s = document.getElementById('status');
    s.textContent = '● 已连接';
    s.className = 'green';
    ws.send(JSON.stringify({ op: 'subscribe', topic: '/dlio/odom_node/odom', type: 'nav_msgs/msg/Odometry' }));
    ws.send(JSON.stringify({ op: 'subscribe', topic: '/dlio/odom_node/pointcloud/deskewed', type: 'sensor_msgs/msg/PointCloud2' }));
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.op === 'publish') {
      if (msg.topic === '/dlio/odom_node/odom') handleOdometry(msg.msg);
      else if (msg.topic === '/dlio/odom_node/pointcloud/deskewed') handlePointCloud(msg.msg);
    }
  };

  ws.onclose = () => {
    rosConnected = false;
    document.getElementById('status').textContent = '● 断开，3秒后重连...';
    document.getElementById('status').className = 'red';
    setTimeout(connectROS, 3000);
  };
  ws.onerror = () => {
    document.getElementById('status').textContent = '● 连接失败';
    document.getElementById('status').className = 'red';
  };
}

function rosToThree(x, y, z) {
  return new THREE.Vector3(x, z, -y);
}

function handleOdometry(msg) {
  const p = msg.pose.pose.position;
  const pos = rosToThree(p.x, p.y, p.z);
  trajPoints.push(pos);
  if (trajPoints.length > 10000) trajPoints.shift();
  trajGeom.setFromPoints(trajPoints);
  trajLineGeom.setFromPoints(trajPoints);
  document.getElementById('traj-count').textContent = trajPoints.length;

  const q = msg.pose.pose.orientation;
  robotPose = {
    position: new THREE.Vector3(p.x, p.y, p.z),
    quaternion: new THREE.Quaternion(q.x, q.y, q.z, q.w),
  };

  // Extract forward velocity (ROS X = forward)
  const vx = msg.twist?.twist?.linear?.x || 0;
  robotVelocity = vx;
  document.getElementById('speed').textContent = vx.toFixed(2);
}

function handlePointCloud(msg) {
  if (!msg.data || msg.width === 0) return;
  const raw = atob(msg.data);
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

  let ox = 0, oy = 0, oz = 0;
  for (const f of msg.fields) {
    if (f.name === 'x') ox = f.offset;
    if (f.name === 'y') oy = f.offset;
    if (f.name === 'z') oz = f.offset;
  }

  const view = new DataView(bytes.buffer);
  const points = [];
  for (let i = 0; i < msg.width; i++) {
    const off = i * msg.point_step;
    points.push(rosToThree(
      view.getFloat32(off + ox, true),
      view.getFloat32(off + oy, true),
      view.getFloat32(off + oz, true)
    ));
  }
  pcGeom.setFromPoints(points);
  document.getElementById('pc-count').textContent = points.length;
}

// ═══════════════════════════════════════════════════════
// Render Loop
// ═══════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  controls.update();

  // Update gait engine from odometry velocity
  GaitEngine.update(dt, robotVelocity);

  // Compute and apply joint angles
  if (Object.keys(jointNodes).length > 0) {
    const joints = GaitEngine.computeJoints();
    applyGait(joints);
  }

  // Apply SLAM pose to base node
  if (robotPose && baseNode) {
    baseNode.position.copy(robotPose.position);
    baseNode.quaternion.copy(robotPose.quaternion);
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

connectROS();
</script>
</body>
</html>
